# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Recommended: use only scotland-yard-8zor (API + WebSocket + frontend).
# The Express server serves dist/ with SPA fallback — no rewrite rules needed.
#
# Sync: Render dashboard → Blueprints → apply changes from this file.
# Service names must match existing Render services.

services:
  - type: web
    name: scotland-yard-8zor
    runtime: node
    buildCommand: yarn --frozen-lockfile install && yarn build
    startCommand: yarn server
    healthCheckPath: /api/health
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false

  # Optional legacy static site. Prefer scotland-yard-8zor for direct /jogo/* links.
  - type: web
    name: scotland-yard-1
    runtime: static
    buildCommand: yarn --frozen-lockfile install && yarn build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: scotland-yard-8zor
          envVarKey: RENDER_EXTERNAL_URL
